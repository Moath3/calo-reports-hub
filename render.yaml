services:
  - type: web
    name: calo-reports
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm start
    disk:
      name: calo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: COMPANY_REG_CODE
        value: CALO2026
      - key: DB_DIR
        value: /data
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: DEFAULT_AI_PROVIDER
        value: gemini
      - key: NETLIFY_ACCESS_TOKEN
        sync: false
      # Bootstrap admin — set in the dashboard, never committed. Leave unset to
      # skip seeding (existing admin row is untouched).
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
